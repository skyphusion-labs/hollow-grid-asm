name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    # Match hollow-grid-c: enough headroom for checks, full smoke, and image build.
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v5
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nasm pkg-config libcjson-dev libwebsockets-dev \
            libcurl4-openssl-dev libssl-dev
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Build and unit/foundation check
        run: make check
      - name: Fetch upstream smoke suite
        run: |
          git clone --depth 1 \
            https://github.com/skyphusion-labs/the-hollow-grid.git /tmp/the-hollow-grid
          git -C /tmp/the-hollow-grid fetch --depth 1 origin \
            67eb601e593fe05febd75fd8e5fa6bfd363ee661
          git -C /tmp/the-hollow-grid checkout \
            67eb601e593fe05febd75fd8e5fa6bfd363ee661
      - name: Blocking upstream smoke
        env:
          SMOKE_MJS: /tmp/the-hollow-grid/smoke.mjs
          HG_SMOKE_PORT: "8793"
          HG_SMOKE_TIMEOUT: "600"
          SMOKE_SLOW: "2"
          DUSTFALL_URL: ws://127.0.0.1:18788/ws
          ADMINS: skyphusion
          ADMIN_TOKEN: ci-test-admin-token
        run: make smoke
      - name: Build container
        run: docker build --platform linux/amd64 .

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nasm pkg-config libcjson-dev libwebsockets-dev \
            libcurl4-openssl-dev libssl-dev
      - name: Run executable coverage surface
        run: |
          make check
          mkdir -p coverage
          printf '%s\n' \
            'Foundation coverage: CLI, HTTP health, deep health, and map endpoint.' \
            > coverage/README.txt
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
