name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nasm pkg-config libcjson-dev libwebsockets-dev \
            libcurl4-openssl-dev libssl-dev
      - name: Build and test
        run: make check
      - name: Build container
        run: docker build --platform linux/amd64 .

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nasm pkg-config libcjson-dev libwebsockets-dev \
            libcurl4-openssl-dev libssl-dev
      - name: Run executable coverage surface
        run: |
          make check
          mkdir -p coverage
          printf '%s\n' \
            'Foundation coverage: CLI, HTTP health, deep health, and map endpoint.' \
            > coverage/README.txt
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage

